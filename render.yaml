services:
  - type: web
    name: customer-data-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 server:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATA_DIR
        value: /var/data
    disk:
      name: customer-data
      mountPath: /var/data
      sizeGB: 1
