<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欄位選項 - 得意佳</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1><span class="brand">得意佳</span>客戶資料管理系統</h1>
      <nav id="mainNav"></nav>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>選擇案場</h2>
      <p class="hint">選擇要設定填寫表單下拉選項的案場。僅顯示您有權限管理的案場。</p>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>案場名稱</th>
              <th>類型</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="sitesBody">
            <tr><td colspan="3" class="empty-row">載入中…</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>
  <script src="/js/nav.js"></script>
  <script src="/js/field-options.js"></script>
</body>
</html>
