<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>查看資料 - 得意佳</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1><span class="brand">得意佳</span>客戶資料管理系統</h1>
      <nav id="mainNav"></nav>
    </div>
  </header>

  <main class="container">
    <section class="card site-filter-card">
      <h2>選擇案場</h2>
      <div class="site-filter-row">
        <div class="form-group site-select-group">
          <label for="searchSite">查看哪個案場的資料</label>
          <select id="searchSite" class="site-select">
            <option value="">全部案場</option>
          </select>
        </div>
        <div id="currentSiteLabel" class="current-site-label">目前顯示：全部案場</div>
      </div>
    </section>

    <section class="card">
      <h2>篩選條件</h2>
      <div class="search-grid">
        <div class="form-group">
          <label for="searchYear">年度</label>
          <select id="searchYear">
            <option value="">全部年度</option>
          </select>
        </div>
        <div class="form-group">
          <label for="searchStartDate">起始日期</label>
          <input type="date" id="searchStartDate">
        </div>
        <div class="form-group">
          <label for="searchEndDate">結束日期</label>
          <input type="date" id="searchEndDate">
        </div>
        <div class="form-group">
          <label for="searchRegion">區域</label>
          <input type="text" id="searchRegion" placeholder="輸入區域名稱">
        </div>
        <div class="form-group">
          <label for="searchVisitType">客戶類型</label>
          <select id="searchVisitType">
            <option value="">全部</option>
            <option value="新客">新客</option>
            <option value="回訪">回訪</option>
          </select>
        </div>
        <div class="form-group">
          <label for="searchDeal">是否成交</label>
          <select id="searchDeal">
            <option value="">全部</option>
            <option value="1">是</option>
            <option value="0">否</option>
          </select>
        </div>
        <div class="form-group">
          <label for="searchStatus">客戶狀態</label>
          <select id="searchStatus">
            <option value="">全部</option>
            <option value="退戶">退戶</option>
            <option value="正常">正常</option>
          </select>
        </div>
        <div class="form-group">
          <label for="searchPhone">電話</label>
          <input type="tel" id="searchPhone" placeholder="電話號碼">
        </div>
        <div class="form-group">
          <label for="searchName">姓名</label>
          <input type="text" id="searchName" placeholder="客戶姓名">
        </div>
      </div>
      <div class="exclude-row">
        <label class="radio-label"><input type="checkbox" id="excludeNew"> 剔除新客</label>
        <label class="radio-label"><input type="checkbox" id="excludeReturn"> 剔除回訪</label>
        <label class="radio-label"><input type="checkbox" id="excludeDeal"> 剔除成交</label>
      </div>
      <div class="form-actions">
        <button type="button" id="searchBtn" class="btn btn-primary">查詢資料</button>
        <button type="button" id="dealPresetBtn" class="btn btn-secondary">成交表單</button>
        <button type="button" id="clearSearchBtn" class="btn btn-outline">清除條件</button>
      </div>
    </section>

    <section class="card">
      <div class="column-picker-header">
        <h2>報表欄位設定</h2>
        <div class="column-picker-actions">
          <button type="button" id="selectAllCols" class="btn-sm">全選</button>
          <button type="button" id="deselectAllCols" class="btn-sm">全不選</button>
          <button type="button" id="resetCols" class="btn-sm">恢復預設</button>
        </div>
      </div>
      <p class="hint">勾選要顯示在列表與匯出報表中的欄位</p>
      <div id="columnPicker" class="column-picker"></div>
    </section>

    <section class="card">
      <div class="results-header">
        <h2>資料列表 <span id="resultCount" class="badge">0 筆</span></h2>
        <button type="button" id="exportBtn" class="btn btn-secondary">匯出報表 (CSV)</button>
      </div>
      <div class="table-wrap">
        <table class="data-table" id="resultsTable">
          <thead id="resultsHead">
            <tr><th>請先查詢資料</th></tr>
          </thead>
          <tbody id="resultsBody">
            <tr><td class="empty-row">請選擇案場與條件後按「查詢資料」</td></tr>
          </tbody>
        </table>
      </div>
      <div id="pagination" class="pagination hidden"></div>
    </section>

    <section class="card">
      <h2>統計摘要</h2>
      <div id="statsPanel" class="stats-grid"></div>
    </section>

    <section class="card danger-zone">
      <h2>資料管理</h2>
      <p class="hint danger-hint">以下操作無法復原，請謹慎使用。建議先匯出 CSV 備份。</p>
      <div class="delete-site-row">
        <div class="form-group">
          <label for="deleteSiteSelect">選擇案場</label>
          <select id="deleteSiteSelect" class="site-select">
            <option value="">全部案場</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" id="deleteSiteDataBtn" class="btn btn-danger">清空選定案場資料</button>
          <button type="button" id="deleteAllBtn" class="btn btn-outline btn-danger-outline">清空全部案場資料</button>
        </div>
      </div>
    </section>
  </main>

  <div id="detailModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>客戶資料詳情</h3>
        <button type="button" class="modal-close" id="closeModal">&times;</button>
      </div>
      <div id="detailContent" class="modal-body"></div>
      <div class="modal-footer">
        <button type="button" id="detailEditBtn" class="btn btn-secondary">編輯</button>
        <button type="button" id="detailDeleteBtn" class="btn btn-danger">刪除此筆</button>
      </div>
    </div>
  </div>

  <div id="editModal" class="modal hidden">
    <div class="modal-content modal-content-lg">
      <div class="modal-header">
        <h3>編輯客戶資料</h3>
        <button type="button" class="modal-close" id="closeEditModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="edit-system-fields form-grid">
          <div class="form-group">
            <label for="editSite">案場</label>
            <select id="editSite"></select>
          </div>
          <div class="form-group">
            <label>客戶類型</label>
            <div class="radio-row">
              <label class="radio-label"><input type="radio" name="editVisitType" value="新客"> 新客</label>
              <label class="radio-label"><input type="radio" name="editVisitType" value="回訪"> 回訪</label>
            </div>
          </div>
          <div class="form-group">
            <label>是否成交</label>
            <div class="radio-row">
              <label class="radio-label"><input type="radio" name="editIsDeal" value="0"> 否</label>
              <label class="radio-label"><input type="radio" name="editIsDeal" value="1"> 是</label>
            </div>
          </div>
        </div>
        <div id="editFormSections" class="edit-form-sections"></div>
        <div class="form-actions edit-form-actions">
          <button type="button" id="saveEditBtn" class="btn btn-primary">儲存變更</button>
          <button type="button" id="cancelEditBtn" class="btn btn-outline">取消</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/nav.js"></script>
  <script src="/js/search.js"></script>
</body>
</html>
