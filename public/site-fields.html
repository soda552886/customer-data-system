<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案場欄位設定 - 得意佳</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1><span class="brand">得意佳</span>客戶資料管理系統</h1>
      <nav id="mainNav"></nav>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <div class="results-header">
        <h2 id="pageTitle">案場欄位設定</h2>
        <a href="/field-options.html" class="btn btn-outline">返回欄位選項</a>
      </div>
      <div class="tab-bar">
        <button type="button" class="tab-btn active" data-tab="options">下拉選項</button>
        <button type="button" class="tab-btn" data-tab="order">報表匯出順序</button>
      </div>
    </section>

    <section class="card tab-panel active" id="panelOptions">
      <p class="hint">
        勾選此案場填寫表單時要顯示的選項。未勾選的選項不會出現在下拉選單。
      </p>
      <div class="field-options-toolbar">
        <button type="button" class="btn-sm" id="expandAllBtn">全部展開</button>
        <button type="button" class="btn-sm" id="collapseAllBtn">全部收合</button>
        <button type="button" class="btn-sm" id="resetAllBtn">恢復全部預設</button>
        <button type="button" class="btn btn-primary" id="saveOptionsBtn">儲存選項</button>
      </div>
      <div id="fieldsContainer"><p class="empty-row">載入中…</p></div>
    </section>

    <section class="card tab-panel hidden" id="panelOrder">
      <p class="hint">
        勾選此案場匯出 CSV 時要包含的欄位，並用上移／下移調整順序（可跨群組自由排序，以配合工地報表格式）。「查看資料」列表顯示不受影響。
      </p>
      <div class="field-options-toolbar">
        <span class="hint" id="exportCountLabel"></span>
        <button type="button" class="btn-sm" id="selectAllExportBtn">全部勾選</button>
        <button type="button" class="btn-sm" id="selectNoneExportBtn">全部取消</button>
        <button type="button" class="btn-sm" id="resetOrderBtn">恢復預設</button>
        <button type="button" class="btn btn-primary" id="saveOrderBtn">儲存匯出設定</button>
      </div>
      <div id="orderContainer"><p class="empty-row">載入中…</p></div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>
  <script src="/js/nav.js"></script>
  <script src="/js/site-fields.js"></script>
</body>
</html>
